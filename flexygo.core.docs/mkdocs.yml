site_name: Flexygo Core
site_author: Flexygo
copyright: Copyright © 2025 Flexygo
theme:
  favicon: images/logos/favicon.png
  logo: images/logos/fl.svg
  name: material
  custom_dir: overrides
  language: es
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night 
        name: Switch to dark mode
    - scheme: darkmode
      toggle:
        icon: octicons/sun-16
        name: Switch to light mode
  features:
    - navigation.path
    - navigation.expand # Expanded sections in sidebar
    - navigation.sections # Section headers in sidebar
    - navigation.instant # Instant page loading (SPA-like)
    - navigation.tracking # Track active section in sidebar
    - navigation.top # Track active section in sidebar
    - search.highlight # Highlight search terms
    - search.suggest # Show search suggestions
    - content.code.copy  # Code copy button

extra_css:
  # Basic styles for every documentation project
  ## Basic Structure
  - stylesheets/custom-colors.css
  - stylesheets/fh-structural/base.css
  - stylesheets/fh-structural/code-highlighting.css
  - stylesheets/fh-structural/css-class-components.css
  - stylesheets/fh-structural/404-error.css
  ## Basic components
  - stylesheets/fh-structural/components/fh-modal.css
  - stylesheets/fh-structural/components/fh-copy.css
  - stylesheets/fh-structural/components/fh-namepropagator.css
  - stylesheets/fh-structural/components/fh-versions.css
  ## Basic fonts and icons
  - docs_assets/fh-structural/fonts/flags/flags.css
  - docs_assets/fh-structural/fonts/flexygo/utils.css
  - docs_assets/fh-structural/fonts/flexygo/flexygo-icons.css
extra_javascript:
  # Basic javascripts for every documentation project
  ## Basic utilities
  - javascripts/fh-structural/utils.js
  ## Basic components
  - javascripts/fh-structural/components/fh-modal.js
  - javascripts/fh-structural/components/fh-copy.js
  - javascripts/fh-structural/components/fh-popover.js
  - javascripts/fh-structural/components/fh-namepropagator.js
  - javascripts/fh-structural/components/fh-versions.js
  - javascripts/fh-structural/components/flx-navbutton.js
  ## Translation files
  - javascripts/cultures/default_language.js
  - javascripts/cultures/es.js
  - javascripts/cultures/en.js

  # Your project js files here ↓
extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/flexygo
      name: Flexygo Discord
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/flexygo
      name: Flexygo Instagram
  generator: false
markdown_extensions:
  - attr_list
  - abbr
  - pymdownx.snippets:
      auto_append:
        - docs/includes/abbreviations.md
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - md_in_html
  - pymdownx.blocks.caption
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
plugins:
  - search:
      lang: es
  - glightbox
nav:
  - Inicio: index.md
  # working-with-core.md oculta via CSS, NO en nav
  - Despliegue:
      - Requisitos del sistema: despliegue/requisitos.md
      - Instalador:
          - Introducción: despliegue/instalador.md
          - Despliegue: despliegue/instalacion-despliegue.md
          - Desarrollo: despliegue/instalacion-desarrollo.md
          - Migración: despliegue/instalacion-migracion.md
          - Desinstalar: despliegue/desinstalar.md
      - Asistente de configuración:
          - Configuración: despliegue/configuracion.md
          - Referencia appsettings.json: despliegue/referencia-appsettings.md
      - Actualizador:
          - Flujo de actualización: despliegue/actualizador.md
          - Actualización Docker: despliegue/actualizadordocker.md
      - Docker: despliegue/docker.md
      - Kestrel: despliegue/kestrel.md
  - Desarrollo de producto:
      - Requisitos: producto/requisitos.md
      - Plantilla: producto/plantilla.md
      - Gestión de producto: producto/gestionproducto.md
      - Extensiones IDE: producto/extension.md
      - Personalización: producto/personalizacion.md
      - MCP:
          - Prerrequisitos: mcp/prerequisitos.md
          - Uso básico: mcp/uso.md
          - Configuración: mcp/configuracion.md
          - Herramientas: mcp/herramientas.md
          - Buenas prácticas: mcp/tips-copilot.md
  - CI/CD:
      - Visión general: cicd/overview.md
      - TeamCity: cicd/teamcity.md
      - GitHub/GitLab: cicd/github-gitlab.md
      - Azure DevOps: cicd/azure-devops.md
  - Solución de Problemas:
      - Despliegue: soluciones/despliegue.md
      - MCP: soluciones/mcp.md
