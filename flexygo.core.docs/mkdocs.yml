site_name: Flexygo Core
site_author: Flexygo
copyright: Copyright © 2025 Flexygo
theme:
  favicon: images/logos/favicon.png
  logo: images/logos/logo.png
  name: material
  language: es
  palette:
  - scheme: slate
    primary: black
    accent: custom
    toggle:
        icon: material/brightness-4
        name: Switch to light mode
  - scheme: default
    toggle:
        icon: material/brightness-7 
        name: Switch to dark mode
    primary: black
    accent: custom
  features:
    - navigation.top
    - content.code.copy

extra_css:
  - stylesheets/extra.css
  - stylesheets/center-images.css
extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/flexygo
      name: Flexygo Discord
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/flexygo
      name: Flexygo Instagram
  generator: false
markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
nav:
  - Inicio: index.md
  - Despliegue:
      - Instalador: despliegue/instalador.md
      - Actualizador: despliegue/actualizador.md
      - Kestrel: despliegue/kestrel.md
      - IIS: despliegue/iis.md
      - Docker: despliegue/docker.md
  - Crear Producto:
      - Requisitos previos: producto/requisitos.md
      - Plantilla: producto/plantilla.md
      - Herramientas producto: producto/herramientaproducto.md
      - Extensión Visual Studio: producto/extension.md
